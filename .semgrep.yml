rules:
  - id: keras-load-model-requires-compile-false
    languages:
      - python
    severity: WARNING
    message: "Use compile=False when loading Keras models for inference or custom-loss evaluation."
    patterns:
      - pattern: tf.keras.models.load_model(...)
      - pattern-not: tf.keras.models.load_model(..., compile=False, ...)

  - id: avoid-shuffled-holdout-take-skip-split
    languages:
      - python
    severity: ERROR
    message: "Do not split a shuffled tf.data holdout with take()/skip(); it can overlap between validation and test."
    pattern-either:
      - patterns:
          - pattern: |
              $COMMON = dict(..., shuffle=True, ...)
              ...
              $HOLDOUT = tf.keras.utils.image_dataset_from_directory(..., **$COMMON)
              ...
              $TEST = $HOLDOUT.take(...)
              ...
              $VAL = $HOLDOUT.skip(...)
      - patterns:
          - pattern: |
              $HOLDOUT = tf.keras.utils.image_dataset_from_directory(..., shuffle=True, ...)
              ...
              $TEST = $HOLDOUT.take(...)
              ...
              $VAL = $HOLDOUT.skip(...)

  - id: avoid-keras-directory-validation-split-without-shuffle
    languages:
      - python
    severity: ERROR
    message: "Do not use Keras directory validation_split with shuffle=False; it can split alphabetically by class."
    pattern-either:
      - pattern: tf.keras.utils.image_dataset_from_directory(..., validation_split=$SPLIT, ..., shuffle=False, ...)
      - patterns:
          - pattern: |
              $COMMON = dict(..., validation_split=$SPLIT, ..., shuffle=False, ...)
              ...
              tf.keras.utils.image_dataset_from_directory(..., **$COMMON)

  - id: blocked-vulnerable-training-pins
    languages:
      - generic
    severity: ERROR
    message: "This training dependency pin has known high-severity vulnerabilities; use a patched version."
    paths:
      include:
        - training/requirements.txt
    pattern-either:
      - pattern: Pillow==10.4.0
      - pattern: keras==3.0.0
      - pattern: keras==3.1.0
      - pattern: keras==3.2.0
      - pattern: keras==3.11.3
      - pattern-regex: '^keras==3\.(?:[0-9]|1[0-2])\.[0-9]+(?:\b|$)'
      - pattern-regex: '^keras==3\.13\.[01](?:\b|$)'
